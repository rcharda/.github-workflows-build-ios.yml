name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Latest Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # On passe à la version 22 pour satisfaire Capacitor

      - name: Setup Project
        run: |
          # 1. Nettoyage et création du package.json
          rm -rf package.json package-lock.json
          echo '{"name":"myboxapp","version":"1.0.0","private":true}' > package.json
          
          # 2. Installation de Capacitor
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest
          
          # 3. Vérification du dossier www
          if [ ! -d "www" ]; then mkdir -p www; fi
          if [ ! -f "www/index.html" ]; then echo "<html><body>My Box TV</body></html>" > www/index.html; fi
          
          # 4. Configuration de l'App
          echo '{"appId":"com.elecpro.myboxtv","appName":"MyBoxTV","webDir":"www"}' > capacitor.config.json
          
          # 5. Ajout de la plateforme iOS
          npx cap add ios

      - name: Fix iOS Compatibility
        run: |
          # On force iOS 13.0 dans le Podfile
          if [ -f "ios/App/App/Podfile" ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' ios/App/App/Podfile
          fi
          # Mise à jour des dépendances natives
          cd ios/App && pod update Capacitor || echo "Pod update skipped"

      - name: Sync & Build
        run: |
          npx cap sync ios
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r MyBoxTV.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBoxTV-Application-IPA
          path: MyBoxTV.ipa
