name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Project (Correction Forcee)
        run: |
          # 1. On nettoie tout pour repartir de zero sur le serveur
          rm -rf package.json package-lock.json node_modules
          
          # 2. On cree un package.json ultra basique manuellement
          echo '{"name":"myboxapp","version":"1.0.0","private":true,"dependencies":{"@capacitor/cli":"latest","@capacitor/core":"latest","@capacitor/ios":"latest"}}' > package.json
          
          # 3. Installation forcee des outils
          npm install
          
          # 4. Preparation du dossier www (on utilise le votre)
          if [ -d "www" ]; then
            echo "Dossier www detecte."
          else
            mkdir -p www
            # On cherche index_ui.html si index.html n'existe pas
            cp index_ui.html www/index.html || echo "<html><body>My Box TV</body></html>" > www/index.html
          fi
          
          # 5. Creation forcee du fichier config
          echo '{"appId":"com.elecpro.myboxtv","appName":"MyBoxTV","webDir":"www"}' > capacitor.config.json
          
          # 6. Ajout de la plateforme iOS
          npx cap add ios

      - name: Fix iOS Compatibility
        run: |
          # Correction du Podfile pour iOS 13.0
          if [ -f "ios/App/App/Podfile" ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' ios/App/App/Podfile
          fi
          # Mise a jour des pods
          cd ios/App && pod update Capacitor || echo "Pod update skipped"

      - name: Sync & Build
        run: |
          npx cap sync ios
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r MyBoxTV.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBoxTV-Application-IPA
          path: MyBoxTV.ipa
