name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Project
        run: |
          # 1. Créer un fichier de configuration pour éviter les erreurs npm
          echo '{"name": "myboxapp", "version": "1.0.0"}' > package.json
          
          # 2. Installer Capacitor proprement
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          
          # 3. Vérifier le dossier www (votre structure actuelle)
          # Si le dossier www existe, on s'assure qu'il contient un index.html
          if [ -d "www" ]; then
            echo "Dossier www trouvé."
          else
            mkdir -p www
            echo "<html><body>My Box TV - Erreur de structure</body></html>" > www/index.html
          fi
          
          # 4. Créer le fichier de config Capacitor
          echo '{"appId": "com.elecpro.myboxtv", "appName": "MyBoxTV", "webDir": "www"}' > capacitor.config.json
          
          # 5. Ajouter la plateforme iOS
          npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build App Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r MyBoxTV.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBoxTV-Application-IPA
          path: MyBoxTV.ipa
