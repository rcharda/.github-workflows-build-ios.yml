name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Project
        run: |
          # 1. Créer le package.json
          echo '{"name": "myboxapp", "version": "1.0.0"}' > package.json
          
          # 2. Installer les versions stables de Capacitor
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/ios@latest
          
          # 3. Configurer l'application
          echo '{"appId": "com.elecpro.myboxtv", "appName": "MyBoxTV", "webDir": "www"}' > capacitor.config.json
          
          # 4. Créer le dossier www s'il est manquant (sécurité)
          mkdir -p www
          if [ ! -f "www/index.html" ]; then echo "<html><body>My Box TV</body></html>" > www/index.html; fi
          
          # 5. Ajouter la plateforme iOS
          npx cap add ios

      - name: Fix iOS Deployment Target (Le Correctif)
        run: |
          # Cette ligne force le projet à cibler iOS 13.0 au lieu de la version trop vieille
          sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' ios/App/Podfile
          # On force aussi la mise à jour des dépendances natives
          cd ios/App && pod update Capacitor

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build App Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r MyBoxTV.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBoxTV-Application-IPA
          path: MyBoxTV.ipa
