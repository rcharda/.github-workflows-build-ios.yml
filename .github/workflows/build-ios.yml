name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          mkdir -p www
          # On vérifie si index.html existe, sinon on le crée
          cp index.html www/index.html || echo "<html><body>My Box TV</body></html>" > www/index.html
          npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build App Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r MyBoxTV.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBoxTV-Application-IPA
          path: MyBoxTV.ipa
