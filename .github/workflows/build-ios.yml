name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Project
        run: |
          # Création d'un dossier temporaire propre pour éviter l'erreur de nom
          mkdir temp_build
          cp index_ui.html temp_build/index.html || cp index.html temp_build/index.html || echo "<html><body>App</body></html>" > temp_build/index.html
          
          # Initialisation forcée avec un nom valide
          npm init -y --scope=@myboxtv --name myboxapp
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          
          # Configuration manuelle du dossier de sortie
          mkdir -p www
          cp temp_build/index.html www/index.html
          
          # Ajout de la plateforme iOS
          npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build App Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r MyBoxTV.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBoxTV-Application-IPA
          path: MyBoxTV.ipa
